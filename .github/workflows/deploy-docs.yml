name: Deploy docs to GitHub Pages

# Triển khai trang hướng dẫn (docs/) lên GitHub Pages.
# Lưu ý: chỉ host được TRANG TĨNH (docs). Chatbot thật cần backend FastAPI + index
# nên KHÔNG chạy được trên Pages.
#
# Bật một lần: Settings → Pages → Build and deployment → Source: "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Chỉ chạy một lần deploy tại một thời điểm.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
